services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: openhuman-db
    restart: always
    environment:
      POSTGRES_DB: openhuman
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openhuman"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: openhuman-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD}@postgres:5432/openhuman
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL:-openai/gpt-4o-mini}
      COGNEE_LLM_PROVIDER: ${COGNEE_LLM_PROVIDER:-openai}
      COGNEE_LLM_ENDPOINT: ${COGNEE_LLM_ENDPOINT}
      COGNEE_LLM_API_KEY: ${COGNEE_LLM_API_KEY}
      COGNEE_LLM_MODEL: ${COGNEE_LLM_MODEL:-openai/gpt-4o-mini}
      COGNEE_EMBEDDING_PROVIDER: ${COGNEE_EMBEDDING_PROVIDER:-openai}
      COGNEE_EMBEDDING_ENDPOINT: ${COGNEE_EMBEDDING_ENDPOINT}
      COGNEE_EMBEDDING_MODEL: ${COGNEE_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      COGNEE_EMBEDDING_API_KEY: ${COGNEE_EMBEDDING_API_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_JWT_KEY: ${CLERK_JWT_KEY}
      COGNEE_DATA_DIR: /app/cognee_data
      STORAGE_BACKEND: local
      UPLOAD_DIR: /app/uploads
      GATEWAY_ENABLED: "false"
    volumes:
      - cognee_data:/app/cognee_data
      - upload_data:/app/uploads
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    container_name: openhuman-web
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    ports:
      - "3000:3000"

volumes:
  pgdata:
    driver: local
  cognee_data:
    driver: local
  upload_data:
    driver: local
