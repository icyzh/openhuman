version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:16-pgdg
    container_name: openhuman-db
    restart: always
    environment:
      POSTGRES_DB: openhuman
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: production-password-here
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openhuman"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: openhuman-api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATABASE_URL: postgresql+asyncpg://postgres:production-password-here@postgres:5432/openhuman
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production-must-be-very-long}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-64-char-hex-string}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      COGNEE_DATA_DIR: /app/cognee_data
      STORAGE_BACKEND: local
      UPLOAD_DIR: /app/uploads
      GATEWAY_ENABLED: "false"
    volumes:
      - cognee_data:/app/cognee_data
      - upload_data:/app/uploads
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: openhuman-web
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"

volumes:
  pgdata:
    driver: local
  cognee_data:
    driver: local
  upload_data:
    driver: local
