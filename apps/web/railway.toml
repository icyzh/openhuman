[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "app/**",
  "components/**",
  "lib/**",
  "hooks/**",
  "stores/**",
  "public/**",
  "package.json",
  "Dockerfile",
  "railway.toml",
]

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
numReplicas = 1