[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "app/**",
  "alembic/**",
  "alembic.ini",
  "pyproject.toml",
  "uv.lock",
  "Dockerfile",
  "railway.toml",
]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
numReplicas = 1
